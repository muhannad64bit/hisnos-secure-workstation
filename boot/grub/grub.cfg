# HisnOS Live Boot — GRUB 2 Configuration
# Generated for use with xorriso hybrid ISO.
# Volume label must match: HISNOS_LIVE
#
# Kernel parameters:
#   hisnos.live=1      — activates 90hisnos-live dracut module
#   rd.live.image      — signals dracut this is a live image (compat)
#   root=live:CDLABEL=HISNOS_LIVE — source device identification
#   rd.debug           — verbose dracut output to /run/initramfs/rdsosreport.txt
#   loglevel=7         — full kernel log (reduce to 3 for production)

set default=0
set timeout=30
set timeout_style=menu

# Load GRUB modules required for live ISO boot.
insmod all_video
insmod gfxterm
insmod png
insmod echo
insmod regexp
insmod test
insmod gzio
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod loopback
insmod linux

# Attempt to set graphical terminal (fallback to console).
if loadfont /boot/grub/fonts/unicode.pf2 ; then
    terminal_output gfxterm
fi

# ── Colour scheme ──────────────────────────────────────────────────────────
set menu_color_normal=white/black
set menu_color_highlight=black/cyan

# ── Locate self ────────────────────────────────────────────────────────────
# When booting from USB/DVD, $root is the ISO device.
# The CDLABEL must match the xorriso -volid argument used during ISO build.
search --no-floppy --label --set=root HISNOS_LIVE

# ── Shared kernel parameters ───────────────────────────────────────────────
# These are included by all menu entries to avoid duplication.
set live_params="hisnos.live=1 rd.live.image root=live:CDLABEL=HISNOS_LIVE"
set debug_params="rd.debug loglevel=7 systemd.journald.forward_to_console=yes"
set gfx_params="quiet splash plymouth.ignore-serial-consoles"
set security_params="selinux=0 enforcing=0 audit=0"
set hw_params="nomodeset.off acpi=force"

# ── Menu entry 1: HisnOS Live (Default) ───────────────────────────────────
menuentry "HisnOS Secure Workstation — Live Session" --class hisnos --class gnu-linux {
    linux  /boot/vmlinuz \
        ${live_params} \
        ${gfx_params} \
        ${security_params} \
        rhgb
    initrd /boot/initrd.img
}

# ── Menu entry 2: HisnOS Live — Safe Mode ─────────────────────────────────
menuentry "HisnOS Live — Safe Mode (nomodeset, basic graphics)" --class hisnos {
    linux  /boot/vmlinuz \
        ${live_params} \
        nomodeset \
        xdriver=vesa \
        ${security_params} \
        plymouth.enable=0 \
        loglevel=5
    initrd /boot/initrd.img
}

# ── Menu entry 3: HisnOS Live — Debug Mode ────────────────────────────────
menuentry "HisnOS Live — Debug Mode (verbose, no plymouth)" --class hisnos {
    linux  /boot/vmlinuz \
        ${live_params} \
        ${debug_params} \
        ${security_params} \
        plymouth.enable=0 \
        systemd.log_level=debug \
        rd.udev.debug \
        console=tty0 \
        console=ttyS0,115200n8
    initrd /boot/initrd.img
}

# ── Menu entry 4: HisnOS Live — Rescue Shell ──────────────────────────────
# Drops into the initramfs emergency shell before switch_root.
menuentry "HisnOS Live — Initramfs Rescue Shell" --class hisnos {
    linux  /boot/vmlinuz \
        ${live_params} \
        rd.debug \
        loglevel=7 \
        rd.break=pre-pivot \
        plymouth.enable=0 \
        console=tty0
    initrd /boot/initrd.img
}

# ── Menu entry 5: Install to Disk ─────────────────────────────────────────
# Same as default but sets HISNOS_INSTALL_MODE=1 so the installer
# skips the "try or install?" prompt and goes directly to installation.
menuentry "Install HisnOS to Disk" --class hisnos --class installer {
    linux  /boot/vmlinuz \
        ${live_params} \
        ${gfx_params} \
        ${security_params} \
        hisnos.install_mode=1 \
        rhgb
    initrd /boot/initrd.img
}

# ── Menu entry 6: Memory Test ─────────────────────────────────────────────
if [ -e /boot/memtest86+ ]; then
menuentry "Memory Test (memtest86+)" --class memtest {
    linux16 /boot/memtest86+
}
fi

# ── End of grub.cfg ───────────────────────────────────────────────────────
