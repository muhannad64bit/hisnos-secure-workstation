# HisnOS Live Boot — ISOLINUX/SYSLINUX Configuration
# Used for BIOS/CSM boot (legacy systems, non-UEFI).
# Paired with GRUB for UEFI systems (hybrid ISO via xorriso).
#
# CDLABEL: HISNOS_LIVE (must match xorriso -volid and blkid label)

default vesamenu.c32
timeout 300
totaltimeout 0
prompt 0

# ── Visual theme ───────────────────────────────────────────────────────────
ui vesamenu.c32
menu title HisnOS Secure Workstation
menu color title        1;36;40  #ff6699ff #00000000 none
menu color border       30;44    #ffffffff #00000000 none
menu color sel          7;37;40  #ffffffff #ff333366 none
menu color unsel        37;44    #ffffffff #00000000 none
menu color hotsel       1;7;37;40 #ffffffff #ff333366 none
menu color hotkey       1;37;40  #ffddbb00 #00000000 none
menu color scrollbar    30;44    #ffffffff #00000000 none
menu color tabmsg       31;40    #ffdddd00 #00000000 none
menu color cmdmark      1;36;40  #ff6699ff #00000000 none
menu color cmdline      37;40    #ffffffff #00000000 none
menu color pwdborder    30;47    #ff000000 #00000000 std
menu color pwdheader    31;47    #ffaa5500 #00000000 std
menu color pwdentry     30;47    #ff000000 #00000000 std
menu color exitmsg      37;40    #ffffff00 #00000000 none
menu color help         37;40    #ffffff00 #00000000 none
menu color msg07        37;40    #ffffff00 #00000000 none
menu vshift 6
menu rows 12
menu helpmsgrow 15
menu cmdlinerow 15
menu timeoutrow 16
menu tabmsgrow 17
menu tabmsg Press Tab to edit | Esc to cancel

# ── Shared cmdline fragments ───────────────────────────────────────────────
# (ISOLINUX does not support variables, so we repeat the common params.)
# Common params: hisnos.live=1 rd.live.image root=live:CDLABEL=HISNOS_LIVE

# ── Entry 1: Live Session (default) ───────────────────────────────────────
label live
  menu label ^HisnOS Live Session
  menu default
  kernel /boot/vmlinuz
  append initrd=/boot/initrd.img \
    hisnos.live=1 \
    rd.live.image \
    root=live:CDLABEL=HISNOS_LIVE \
    quiet splash \
    plymouth.ignore-serial-consoles \
    selinux=0 enforcing=0 \
    rhgb

# ── Entry 2: Safe Mode ────────────────────────────────────────────────────
label safe
  menu label ^Safe Mode (nomodeset, basic graphics)
  kernel /boot/vmlinuz
  append initrd=/boot/initrd.img \
    hisnos.live=1 \
    rd.live.image \
    root=live:CDLABEL=HISNOS_LIVE \
    nomodeset \
    xdriver=vesa \
    selinux=0 enforcing=0 \
    plymouth.enable=0 \
    loglevel=5

# ── Entry 3: Debug Mode ───────────────────────────────────────────────────
label debug
  menu label ^Debug Mode (verbose, no plymouth)
  kernel /boot/vmlinuz
  append initrd=/boot/initrd.img \
    hisnos.live=1 \
    rd.live.image \
    root=live:CDLABEL=HISNOS_LIVE \
    rd.debug \
    loglevel=7 \
    selinux=0 enforcing=0 \
    plymouth.enable=0 \
    systemd.log_level=debug \
    rd.udev.debug \
    console=tty0 \
    console=ttyS0,115200n8

# ── Entry 4: Initramfs Rescue Shell ───────────────────────────────────────
label rescue
  menu label Initramfs ^Rescue Shell (rd.break=pre-pivot)
  kernel /boot/vmlinuz
  append initrd=/boot/initrd.img \
    hisnos.live=1 \
    rd.live.image \
    root=live:CDLABEL=HISNOS_LIVE \
    rd.debug \
    loglevel=7 \
    rd.break=pre-pivot \
    plymouth.enable=0 \
    console=tty0

# ── Entry 5: Install to Disk ──────────────────────────────────────────────
label install
  menu label ^Install HisnOS to Disk
  kernel /boot/vmlinuz
  append initrd=/boot/initrd.img \
    hisnos.live=1 \
    rd.live.image \
    root=live:CDLABEL=HISNOS_LIVE \
    hisnos.install_mode=1 \
    quiet splash \
    selinux=0 enforcing=0 \
    rhgb

# ── Entry 6: memtest86+ ───────────────────────────────────────────────────
label memtest
  menu label ^Memory Test (memtest86+)
  kernel /boot/memtest86+
  append -

# ── Help text ─────────────────────────────────────────────────────────────
# Displayed at bottom of menu (ISOLINUX help screen not used for brevity).
