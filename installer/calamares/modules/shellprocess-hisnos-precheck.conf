# installer/calamares/modules/shellprocess-hisnos-precheck.conf
# Calamares shellprocess module — pre-install hardware validation.
#
# Runs BEFORE the partitioning step so the user is stopped early
# if their hardware does not meet requirements.
#
# Install at:
#   /usr/share/calamares/modules/shellprocess-hisnos-precheck.conf

---
# Do NOT chroot — we are checking the live environment.
dontChroot: true

timeout: 60

script:
  - command: "/bin/bash /etc/calamares/hisnos-precheck.sh"
    timeout: 55
