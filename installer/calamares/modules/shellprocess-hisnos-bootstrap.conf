# installer/calamares/modules/shellprocess-hisnos-bootstrap.conf
# Calamares shellprocess module — HisnOS post-install bootstrap + verify.
#
# Runs INSIDE the target chroot after all packages have been written.
#
# On failure: logs to /var/log/hisnos-install.log, exits non-zero so
# Calamares shows the failure page rather than silently completing.

---
dontChroot: false
timeout: 720

script:
  # ── Copy source tree into target if available ──────────────────────────────
  - "-" : "test -d /run/hisnos-src && cp -r /run/hisnos-src /HisnOS-Secure-Workstation || true"

  # ── Install log directory ──────────────────────────────────────────────────
  - command: "mkdir -p /var/log/hisnos"
    timeout: 5

  # ── Run bootstrap installer ────────────────────────────────────────────────
  # Failures are captured to the install log; non-zero exit triggers rollback.
  - command: "/bin/bash -c 'bash /HisnOS-Secure-Workstation/bootstrap/bootstrap-installer.sh 2>&1 | tee -a /var/log/hisnos-install.log; exit ${PIPESTATUS[0]}'"
    timeout: 600

  # ── Post-install verification ──────────────────────────────────────────────
  - command: "/bin/bash /HisnOS-Secure-Workstation/installer/calamares/hisnos-post-verify.sh"
    timeout: 60

  # ── Enable onboarding for first graphical login ────────────────────────────
  - command: "systemctl enable hisnos-onboarding.service"
    timeout: 10

  # ── Boot health service ────────────────────────────────────────────────────
  - command: "systemctl enable hisnos-boot-health.service"
    timeout: 10

  # ── Validate kernel cmdline ────────────────────────────────────────────────
  - "-" : "bash /HisnOS-Secure-Workstation/boot/validate-kernel-cmdline.sh --fix || true"

  # ── Plymouth theme ────────────────────────────────────────────────────────
  - "-" : "bash /HisnOS-Secure-Workstation/plymouth/install-theme.sh || true"

  # ── Plymouth fallback validation ──────────────────────────────────────────
  - "-" : "bash /HisnOS-Secure-Workstation/boot/plymouth-fallback.sh || true"

  # ── Recovery entry ────────────────────────────────────────────────────────
  - "-" : "bash /HisnOS-Secure-Workstation/recovery/hisnos-recovery-setup.sh || true"

  # ── Install version file ──────────────────────────────────────────────────
  - "-" : "bash /HisnOS-Secure-Workstation/release/install-version.sh || true"

  # ── Clean up source tree ──────────────────────────────────────────────────
  - "-" : "rm -rf /HisnOS-Secure-Workstation || true"
