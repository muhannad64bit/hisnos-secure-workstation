# installer/calamares/settings.conf — Calamares installer configuration for HisnOS
#
# Module sequence follows the standard Calamares pattern:
#   show (UI)  →  exec (apply changes)
#
# References:
#   https://github.com/calamares/calamares/blob/calamares/settings.conf

---
modules-search: [ local, /usr/lib/calamares/modules ]

# ─── Sequence ────────────────────────────────────────────────────────────────
sequence:
  # ── Show phase: UI steps the user walks through ──
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary

  # ── Exec phase: actions applied after the user confirms ──
  - exec:
    # Pre-install hardware validation (RAM, disk, EFI).
    - shellprocess-hisnos-precheck
    - partition
    - mount
    - unpackfs
    - machineid
    - fstab
    - locale
    - keyboard
    - localecfg
    - users
    - networkcfg
    - hwclock
    - services-systemd
    - bootloader
    # HisnOS-specific post-install hook
    - shellprocess-hisnos-bootstrap
    - umount

  # ── Post-install show ──
  - show:
    - finished

# ─── Branding ────────────────────────────────────────────────────────────────
branding: hisnos

# ─── Global options ──────────────────────────────────────────────────────────
prompt-install: true
dont-chroot: false
oem-setup: false
disable-cancel: false
disable-cancel-during-exec: true
quit-at-end: false
