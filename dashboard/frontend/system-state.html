<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HisnOS System State</title>
    <style>
      body { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; margin: 2rem; max-width: 900px; }
      code, pre { background: #111; color: #d9d9d9; padding: .25rem .5rem; border-radius: 6px; }
      pre { white-space: pre-wrap; word-break: break-word; padding: 1rem; }
      .grid { display: grid; grid-template-columns: 1fr; gap: 1rem; }
      .ok { color: #2da44e; } .warn { color: #d29922; } .bad { color: #d73a49; }
      .label { color: #666; }
    </style>
  </head>
  <body>
    <h1>HisnOS Control Plane State</h1>
    <p class="label">Endpoint: <code>/api/system/state</code> (localhost:7374)</p>

    <div class="grid">
      <div>
        <div><span class="label">Last fetch:</span> <span id="ts">-</span></div>
        <div><span class="label">Mode:</span> <span id="mode">-</span></div>
        <div><span class="label">Vault mounted:</span> <span id="vaultMounted">-</span></div>
      </div>
      <div>
        <div class="label">Raw response</div>
        <pre id="raw">{}</pre>
      </div>
    </div>

    <script>
      const stateEl = {
        ts: document.getElementById('ts'),
        mode: document.getElementById('mode'),
        vaultMounted: document.getElementById('vaultMounted'),
        raw: document.getElementById('raw'),
      };

      function render(json) {
        stateEl.ts.textContent = new Date().toISOString();
        stateEl.mode.textContent = json.mode ?? '-';
        stateEl.vaultMounted.textContent = String(json.vault_mounted ?? '-');
        stateEl.raw.textContent = JSON.stringify(json, null, 2);
      }

      async function poll() {
        try {
          const res = await fetch('http://127.0.0.1:7374/api/system/state', { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const json = await res.json();
          render(json);
        } catch (e) {
          stateEl.raw.textContent = JSON.stringify({ error: String(e) }, null, 2);
        }
      }

      poll();
      setInterval(poll, 2000);
    </script>
  </body>
</html>
