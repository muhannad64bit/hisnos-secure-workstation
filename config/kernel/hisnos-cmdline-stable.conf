# HisnOS Stable Kernel Command Line Profile
# Applied via: grub2-editenv - set kernelopts="$(cat this file)"
# Rules:
#   - NO mitigations=off (security + stability)
#   - NO idle=poll (CPU thermal damage)
#   - NO nohz_full (unpredictable latency spikes)
#   - NO rcu_nocbs (kernel regression risk)
#   - NO nosmt (breaks BLAS/gaming workloads)
#   - NO intel_pstate=performance at boot (set post-login by hispowerd)
#   - NO audit=0 at boot (required by auditd for selinux/IMA)
#   - NO acpi=off (breaks thermal, power, battery)
#   - NO selinux=0 in production (use permissive only for diagnostics)

# ── Output / console ──────────────────────────────────────────────────────
quiet
splash
loglevel=3
rd.loglevel=3
systemd.log_level=warning
systemd.log_target=journal

# ── Plymouth ──────────────────────────────────────────────────────────────
rhgb
plymouth.ignore-serial-consoles

# ── cgroup v2 (unified hierarchy — required by hisnosd cgroup limits) ─────
systemd.unified_cgroup_hierarchy=1

# ── Memory — conservative, tested defaults ────────────────────────────────
# zswap with lz4 for fast swap-out (zstd too slow under memory pressure)
zswap.enabled=1
zswap.compressor=lz4
zswap.max_pool_percent=20
# Do NOT set vm.swappiness here — handled by systemd-sysctl.d at runtime

# ── Transparent hugepages ─────────────────────────────────────────────────
# madvise = apps opt in; never = breaks some workloads; always = OOM risk
# Set at runtime by performance layer. Boot-safe default:
transparent_hugepage=madvise

# ── CPU mitigations ───────────────────────────────────────────────────────
# ALL mitigations ENABLED (default). Do NOT add mitigations=off.
# Retpoline is enabled by default on Fedora kernels. Leave it.

# ── IRQ affinity ─────────────────────────────────────────────────────────
# Do NOT set irqaffinity= at boot. IRQ routing is hardware-specific.
# The irq-adaptive-balancer activates only during gaming mode (post-login).

# ── IOMMU ─────────────────────────────────────────────────────────────────
# Enable IOMMU for hardware isolation (required for virtualization).
intel_iommu=on
amd_iommu=on
iommu=pt

# ── NVMe / storage ────────────────────────────────────────────────────────
# nvme_core.default_ps_max_latency_us=0 disables NVMe power state transitions.
# This is safe and reduces storage latency spikes. Do NOT use on laptops.
# Commented out — evaluate per deployment:
# nvme_core.default_ps_max_latency_us=0

# ── Live boot ─────────────────────────────────────────────────────────────
# These are set in grub.cfg entries; not repeated here for installed system.
# hisnos.live=1
# rd.live.image
# root=live:CDLABEL=HISNOS_LIVE

# ── Removed / NEVER USE ───────────────────────────────────────────────────
# mitigations=off        — spectre/meltdown attack surface
# idle=poll              — burns CPU, causes thermal runaway
# nohz_full=<cpulist>    — breaks systemd timers, causes log storms
# rcu_nocbs=<cpulist>    — kernel regression, test-only
# nosmt                  — halves core count, breaks gaming
# processor.max_cstate=0 — thermal damage on Ryzen/Intel
# intel_pstate=performance — set post-login only, not at boot
# pcie_aspm=off          — breaks PCIe power management
# acpi=off               — breaks everything
# noibrs noibpb          — disables spectre mitigations
# spectre_v2=off         — disables spectre v2 mitigations
# l1tf=off               — disables L1TF mitigations
# mds=off                — disables MDS mitigations
