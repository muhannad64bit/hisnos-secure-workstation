# HisnOS Stable sysctl Profile
# Place at: /etc/sysctl.d/90-hisnos-stable.conf
# Applied by: systemd-sysctl.service (after sysinit.target, non-blocking)
#
# Policy: ONLY parameters with proven production track record.
# NO experimental tuning. The performance layer applies aggressive
# parameters POST-LOGIN when gaming mode is activated.

# ── Virtual memory — conservative defaults ────────────────────────────────
# swappiness=60 is the kernel default. Only lower post-login for gaming.
vm.swappiness = 60
# vfs_cache_pressure: default 100. Lower post-login for gaming.
vm.vfs_cache_pressure = 100
# dirty_ratio / dirty_background_ratio: default values.
# Aggressive flushing hurts I/O burst performance. Leave at defaults.
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5

# ── Network — hardened defaults ───────────────────────────────────────────
# SYN flood protection.
net.ipv4.tcp_syncookies = 1
# Reject ICMP redirects (routing attack mitigation).
net.ipv4.conf.all.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
# Disable source routing.
net.ipv4.conf.all.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
# Log martian packets (packets from impossible sources).
net.ipv4.conf.all.log_martians = 1
# Disable IPv6 if not needed (reduces attack surface).
# Comment out if IPv6 is required:
# net.ipv6.conf.all.disable_ipv6 = 1

# ── Kernel hardening ──────────────────────────────────────────────────────
# Restrict /proc/kallsyms (kernel symbol map) to root only.
kernel.kptr_restrict = 1
# Restrict dmesg to privileged users.
kernel.dmesg_restrict = 1
# Disable kexec (prevents replacing running kernel without reboot).
kernel.kexec_load_disabled = 1
# Restrict perf_event to root (reduces side-channel attack surface).
kernel.perf_event_paranoid = 3
# Disable magic sysrq in production (enable for debugging).
# Set to 1 for sysrq-triggered reboot/sync only.
kernel.sysrq = 1
# Restrict ptrace to direct parent process only.
kernel.yama.ptrace_scope = 1

# ── Kernel panic resilience ───────────────────────────────────────────────
# Auto-reboot 10s after kernel panic (prevents silent hangs).
kernel.panic = 10
# Panic on oops (catches corrupted kernel state early).
kernel.panic_on_oops = 1
# Do NOT panic on warnings (too aggressive — causes false panics).
kernel.panic_on_warn = 0

# ── IPC limits ────────────────────────────────────────────────────────────
# Increase shared memory for gaming workloads.
kernel.shmmax = 4294967296
kernel.shmall = 1048576

# ── File descriptor limits ────────────────────────────────────────────────
fs.file-max = 524288
fs.inotify.max_user_watches = 524288
fs.inotify.max_user_instances = 1024

# ── NOT SET HERE (applied post-login by gaming mode) ─────────────────────
# vm.swappiness = 10
# vm.vfs_cache_pressure = 50
# kernel.sched_min_granularity_ns
# kernel.sched_wakeup_granularity_ns
# net.core.netdev_max_backlog
