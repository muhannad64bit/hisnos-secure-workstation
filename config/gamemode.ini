# ~/.config/gamemode.ini — HisnOS GameMode configuration
#
# Install:
#   cp config/gamemode.ini ~/.config/gamemode.ini
#
# If you already have a gamemode.ini, merge the [custom] section manually.
#
# Documentation: man gamemode.ini
#
# HisnOS integration: the [custom] start/end hooks gate the vault idle
# auto-lock timer. Without these hooks, the vault will lock after 5 minutes
# of idle even during an active game session.

[general]
# Renice game process to improve frame times
renice=10

# Inhibit screensaver while a game is running (standard GameMode feature)
# This suppresses KDE's screen lock timeout — vault screen-lock trigger
# will NOT fire during gaming (correct: user is present).
# The vault idle timer is separately gated by the [custom] hooks below.
inhibit_screensaver=1

[custom]
# HisnOS vault integration:
# stop the vault idle-lock timer when a game starts,
# re-enable it when the game ends.
#
# IMPORTANT: This path must match where bootstrap/post-install.sh
# deploys the vault scripts (~/.local/share/hisnos/vault/).
start=$HOME/.local/share/hisnos/vault/hisnos-vault-gamemode.sh start
end=$HOME/.local/share/hisnos/vault/hisnos-vault-gamemode.sh end

# Note: screen-lock auto-lock (org.freedesktop.ScreenSaver) and
# suspend auto-lock (PrepareForSleep) remain active during gaming.
# Only the periodic idle timer is suspended here.
