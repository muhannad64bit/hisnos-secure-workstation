# HisnOS Stable Dracut Configuration
# Place at: /etc/dracut.conf.d/90-hisnos-stable.conf
#
# Goals:
#   - Deterministic initramfs build (no host-specific surprises)
#   - Fast decompression (zstd)
#   - Minimal size (hostonly=yes)
#   - Include 90hisnos-live module, exclude Anaconda live module
#   - No network in initramfs (live mount is local block device)

# ── Core settings ─────────────────────────────────────────────────────────
# hostonly: only include drivers for THIS hardware. Dramatically smaller
# initramfs. For ISO distribution, set to "no" to be hardware-generic.
hostonly="yes"
hostonly_cmdline="yes"

# Compression: zstd is fastest decompression, reasonable size.
# xz = smallest but slow to decompress (adds ~0.5s boot time on NVMe).
compress="zstd"
compress_args="-9"

# ── Required modules ──────────────────────────────────────────────────────
# Include our live boot module. Exclude Anaconda's dracut-live (inst.stage2).
add_dracutmodules+=" 90hisnos-live 95hisnos "
omit_dracutmodules+=" live livenet nfs network network-manager "

# ── Filesystem drivers ────────────────────────────────────────────────────
# These MUST be in the initramfs for live boot.
add_drivers+=" squashfs overlay loop iso9660 vfat "

# ── Block device drivers ──────────────────────────────────────────────────
# USB storage for booting from USB sticks.
add_drivers+=" usb-storage uas sd_mod sr_mod "

# ── Excluded modules (boot delay or instability risk) ─────────────────────
# fcoe / iscsi / nbd: network block devices — blocking network calls
# cifs / nfs: network filesystems — hang if server unreachable
# modsign: adds 0.3s, not needed for live boot
omit_dracutmodules+=" fcoe fcoe-uefi iscsi nbd cifs nfs nfs-lib "
omit_dracutmodules+=" modsign "

# ── Kernel modules blacklist (stability) ──────────────────────────────────
# Never auto-load these in initramfs:
# pcspkr: annoying beeps
# bluetooth: not needed for boot
omit_drivers+=" pcspkr bluetooth btusb "

# ── Timeouts ─────────────────────────────────────────────────────────────
# initqueue timeout: how long to wait for root device (seconds).
# 30s is enough for slow USB sticks. Do NOT set > 60s.
# The 90hisnos-live module exits initqueue the moment the device is found.
# rdshell_timeout: time before dropping to emergency shell on failure.
# We override this with hisnos-emergency; set low so we get our UI fast.

# ── Early microcode ───────────────────────────────────────────────────────
# Load microcode updates early (security + stability).
early_microcode="yes"

# ── Strip options ─────────────────────────────────────────────────────────
# Strip debug symbols from binaries in initramfs (smaller, faster).
do_strip="yes"
do_hardlink="yes"

# ── Reproducible builds ───────────────────────────────────────────────────
reproducible="yes"
