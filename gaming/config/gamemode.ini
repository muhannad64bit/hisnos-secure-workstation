; gamemode.ini — HisnOS GameMode Configuration
;
; Install to: ~/.config/gamemode.ini
; Documentation: man gamemode (package: gamemode-devel)
;
; HisnOS integration:
;   GameMode activates the hisnos-gaming.sh start/stop hooks via the
;   [custom] section. CPU governor is also managed natively by gamemoded
;   itself (desiredgov=performance) before the custom scripts run.
;   This provides a defense-in-depth: even if hisnos-gaming-tuned.service
;   cannot change the governor (e.g., missing polkit rule), gamemoded will.
;
; Immutable Kinoite note:
;   gamemoded must be installed: rpm-ostree install gamemode
;   The gamemode group must exist: gamemode-devel creates it automatically.

[general]
; Reaper frequency: how often to check if games are still running (ms).
reaper_freq=5

; Desired CPU frequency scaling governor for active sessions.
desiredgov=performance
; Fallback governor restored when session ends.
defaultgov=powersave

; Inhibit software power-saving during sessions.
inhibit_screensaver=0   ; HisnOS manages this: screen-lock stays enabled

; Accept connections from specific softwarewhitelist.
; Leave empty to accept from any process in the 'gamemode' group.
softrealtime=auto

[filter]
; Whitelist: game processes that automatically activate gaming mode.
; Add Steam app IDs or executable names here.
; whitelist=hl2:wine:proton
whitelist=
blacklist=

[gpu]
; GPU optimizations — applied by gamemoded natively.
; On NVIDIA: apply_gpu_optimisations=accept-responsibility enables GPU clocking.
; On AMD: no additional config needed (RADV perf hints handled by Mesa).
apply_gpu_optimisations=0
; NV_GPU_PERF_LEVEL and AMD_PERFORMANCE_LEVEL are set by gamemoded.
; nv_powermizer_mode=1   ; Prefer maximum performance

[cpu]
; Park idle CPUs aggressively during gaming to concentrate thermal budget.
; park_cores=yes (requires kernel support for CPU parking)

[custom]
; HisnOS-specific lifecycle hooks.
; These are called after gamemoded's own tuning (CPU governor, GPU opts).
; start= is called when a game session begins.
; end=   is called when all game processes exit.
;
; The hisnos-gaming.sh script:
;   - transitions the Control Plane State Machine to gaming mode
;   - suppresses vault idle auto-lock (vault remains open but screen-lock fires)
;   - requests privileged CPU/IRQ/nftables tuning via system service
;   - emits HISNOS_GAMING_STARTED journal event for audit/threat pipeline
start=%h/.local/share/hisnos/gaming/hisnos-gaming.sh start
end=%h/.local/share/hisnos/gaming/hisnos-gaming.sh stop
