# mangohud.conf — HisnOS MangoHud Overlay Configuration
#
# Install to: ~/.config/MangoHud/MangoHud.conf
# Documentation: https://github.com/flightlessmango/MangoHud
#
# Provides real-time performance visibility during gaming sessions.
# HisnOS-tuned: shows CPU governor, frame times, and GPU temperature so
# operators can verify that the hisnos-gaming-tuned profile is active.

# ── Display position ─────────────────────────────────────────────────────────
position=top-left
# Width in pixels
width=280

# ── Performance metrics ──────────────────────────────────────────────────────
fps
fps_limit=0          # no cap — let the game decide
frametime
frame_timing=1
time

# ── CPU ──────────────────────────────────────────────────────────────────────
cpu_stats
cpu_temp
cpu_power
# Show CPU frequency to verify 'performance' governor is active.
# When hisnos-gaming-tuned is working, all cores should be near max frequency.
cpu_mhz

# ── GPU ──────────────────────────────────────────────────────────────────────
gpu_stats
gpu_temp
gpu_core_clock
gpu_mem_clock
gpu_power
vram

# ── Memory ───────────────────────────────────────────────────────────────────
ram
swap

# ── System ───────────────────────────────────────────────────────────────────
# io_read, io_write — enable for storage-heavy workloads

# ── Appearance ───────────────────────────────────────────────────────────────
background_alpha=0.5
font_size=20
text_color=FFFFFF
background_color=020202
border_color=404040
alpha=0.9

# ── Logging ──────────────────────────────────────────────────────────────────
# Log performance data to a file for post-session analysis.
# log_duration=0         # unlimited (manually stopped)
# output_folder=~/.local/share/hisnos/logs/mangohud/
